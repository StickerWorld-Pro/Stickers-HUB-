<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Hub PRO</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

header{
background:#ff4d4d;
color:white;
text-align:center;
padding:20px;
}

.top-bar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

input{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cat{background:#333;color:white;}
.dark-btn{background:black;color:white;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.sticker{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.dark .sticker{background:#222;}

.sticker img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.download{background:green;color:white;}
.like{background:#ff4d4d;color:white;}
.view{background:#007bff;color:white;}

/* Popup */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#popup img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>🔥 Sticker Hub PRO</h1>
<p>Download • View • Like Stickers</p>
</header>

<div class="top-bar">
<input type="text" id="search" placeholder="Search..." onkeyup="searchSticker()">

<button class="cat" onclick="filterCategory('all')">All</button>
<button class="cat" onclick="filterCategory('anime')">Anime</button>
<button class="cat" onclick="filterCategory('meme')">Meme</button>
<button class="cat" onclick="filterCategory('movie')">Movies</button>

<button class="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="container" id="stickers">

<div class="sticker anime">
<img src="https://via.placeholder.com/200?text=Anime" onclick="viewSticker(this)">
<h3>Anime Sticker</h3>
<button class="view" onclick="viewSticker(this.parentElement.querySelector('img'))">👁 View</button>
<button class="download" onclick="downloadSticker(this)">⬇ Download</button>
<button class="like" onclick="likeSticker(this)">❤️ Like</button>
</div>

<div class="sticker meme">
<img src="https://via.placeholder.com/200?text=Meme" onclick="viewSticker(this)">
<h3>Meme Sticker</h3>
<button class="view" onclick="viewSticker(this.parentElement.querySelector('img'))">👁 View</button>
<button class="download" onclick="downloadSticker(this)">⬇ Download</button>
<button class="like" onclick="likeSticker(this)">❤️ Like</button>
</div>

<div class="sticker movie">
<img src="https://via.placeholder.com/200?text=Movie" onclick="viewSticker(this)">
<h3>Movie Sticker</h3>
<button class="view" onclick="viewSticker(this.parentElement.querySelector('img'))">👁 View</button>
<button class="download" onclick="downloadSticker(this)">⬇ Download</button>
<button class="like" onclick="likeSticker(this)">❤️ Like</button>
</div>

</div>

<!-- VIEW POPUP -->
<div id="popup">
<span class="close" onclick="closePopup()">❌</span>
<img id="popupImg">
</div>

<script>

/* SEARCH */
function searchSticker(){
let input=document.getElementById("search").value.toLowerCase();
let stickers=document.getElementsByClassName("sticker");

for(let i=0;i<stickers.length;i++){
let text=stickers[i].innerText.toLowerCase();
stickers[i].style.display = text.includes(input) ? "block" : "none";
}
}

/* CATEGORY */
function filterCategory(cat){
let stickers=document.getElementsByClassName("sticker");

for(let i=0;i<stickers.length;i++){
if(cat=="all" || stickers[i].classList.contains(cat)){
stickers[i].style.display="block";
}else{
stickers[i].style.display="none";
}
}
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* VIEW */
function viewSticker(img){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src = img.src;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* DOWNLOAD */
function downloadSticker(btn){
let img = btn.parentElement.querySelector("img").src;
let a = document.createElement("a");
a.href = img;
a.download = "sticker.png";
a.click();
}

/* LIKE */
function likeSticker(btn){
let count = btn.dataset.count || 0;
count++;
btn.dataset.count = count;
btn.innerText = "❤️ Like ("+count+")";
}

</script>

</body>
</html>
